[phases.setup]
nixPkgs = ["python311", "pip"]

[phases.install]
cmds = ["cd anra-workspace/backend && pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'No build step needed for Python backend'"]

[start]
cmd = "cd anra-workspace/backend && uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}"
